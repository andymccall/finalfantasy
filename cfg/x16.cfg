MEMORY {
    ZP:      start = $0022, size = $0030, type = rw;
    HEADER:  start = $0000, size = $0002, file = %O, fill = yes;
    MAIN:    start = $0801, size = $9700, file = %O;
    # Banked-RAM window. AM3 pins this to bank 1 at init (bank 0 is X16
    # KERNAL scratch and corrupts anything stored there). MAPDATA row
    # cache is the only resident-bank tenant; switchable banks (2+) are
    # added as BANKxx regions when features need them.
    MAPAREA: start = $A000, size = $1000, type = rw;
    # Switchable bank images. Each BANKxx region represents one 8KB
    # banked-window slot. Symbols inside BANKED_xx resolve to $A000-$BFFF
    # (so banked code references the window at runtime), but the bytes
    # ship in the PRG as a trailing image that AM3_LoadBanks copies into
    # bank xx at boot. See docs/am3_mbc_design.md "Bank loader" for the
    # option-B rationale (single PRG, one-shot init copy).
    BANK02:  start = $A000, size = $2000, type = ro;
}

SEGMENTS {
    ZEROPAGE:  load = ZP,       type = zp,  define = yes;
    LOADADDR:  load = HEADER,   type = ro;
    STARTUP:   load = MAIN,     type = ro;
    CODE:      load = MAIN,     type = ro;
    RODATA:    load = MAIN,     type = ro;
    DATA:      load = MAIN,     type = rw;
    BSS:       load = MAIN,     type = bss, define = yes;
    MAPDATA:   load = MAPAREA,  type = bss, define = yes;
    # BANKED_02 symbols resolve at $A000 (run = BANK02); the bytes ship
    # in the PRG (load = MAIN) so they ride along as a trailing blob.
    BANKED_02: load = MAIN,     run = BANK02, type = ro, define = yes;
}
